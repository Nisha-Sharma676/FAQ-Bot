<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQBot - Smart FAQ Assistant</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <h1>FAQBot</h1>
        <p class="subtitle">Powered by Azure OpenAI</p>

        <!-- System Prompt Section -->
        <div class="card">
            <h2>System Prompt</h2>
            <p>Tell the bot who it is and what it knows</p>

          <textarea id="systemPrompt" placeholder="Example: You are an AIML Study Assistant. You answer only questions related to Artificial Intelligence, Machine Learning, Deep Learning, Python programming, data preprocessing, neural networks, and exam preparation. If a user asks anything unrelated to AIML, politely explain that you are designed only for AIML-related queries.">You are an AIML Study Assistant. You answer only questions related to Artificial Intelligence, Machine Learning, Deep Learning, Python programming, data preprocessing, neural networks, and exam preparation. If a user asks anything unrelated to AIML, politely explain that you are designed only for AIML-related queries.</textarea>
        </div>

        <!-- Chat Section -->
        <div class="card">
            <h2>Ask a Question</h2>

            <div id="chatBox" class="chat-box">
                <div class="message bot">
                    Hi! I am FAQBot. Ask me anything!
                </div>
            </div>

            <div class="input-row">
                <input type="text" id="userInput" placeholder="Type your question here..." />
                <button id="sendBtn">Send</button>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
